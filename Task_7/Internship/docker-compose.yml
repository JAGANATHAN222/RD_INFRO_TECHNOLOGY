services:
  db:
    image: mysql:8.0
    container_name: computer-stock-manager-db
    environment:
      MYSQL_DATABASE: shop
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # Force TCP (localhost may use the unix socket and go "healthy" too early)
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=TCP", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  app:
    build:
      context: .
    container_name: computer-stock-manager-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/shop
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      # Keep same log file path, but inside container it will be under /app/logs via working dir
      LOGGING_FILE_NAME: logs/computer-stock-manager.log
    volumes:
      - ./logs:/app/logs

volumes:
  db_data:

